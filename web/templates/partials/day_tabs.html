{{define "day_tabs"}}
{{range $i, $d := .Days}}
{{if eq (mod $i 7) 0}}<span class="days-week">{{t "tab.week"}} {{add (div $i 7) 1}}</span>{{end}}
<button type="button" class="tabs__tab tabs__tab--day" data-tab="day-{{$i}}" data-day-index="{{$i}}"><span class="tabs__wd">{{t (printf "weekday.%s" (weekday $d))}}</span><span class="tabs__sub">{{fmtDate $d}}</span></button>
{{end}}
{{end}}
