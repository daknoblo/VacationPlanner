{{define "activity_item"}}
<li class="activity-item" data-id="{{.ID}}" data-start="{{.StartMin}}" data-end="{{.EndMin}}">
  <div class="activity-item__head">
    <span class="activity-item__time">{{.StartLabel}}–{{.EndLabel}}</span>
    <strong class="activity-item__title">{{.Title}}</strong>
    {{if .Category}}<span class="badge">{{.Category}}</span>{{end}}
    <button class="btn btn--sm btn--danger btn--ghost" title="{{t "action.delete"}}"
            hx-delete="/activities/{{.ID}}"
            hx-target="closest .activity-item"
            hx-swap="outerHTML"
            hx-confirm="{{t "activity.confirm_delete"}}">✕</button>
  </div>
  {{if .Location}}<p class="small">📍 {{.Location}}</p>{{end}}
  {{if .Description}}<p class="activity-item__desc small">{{.Description}}</p>{{end}}
</li>
{{end}}
