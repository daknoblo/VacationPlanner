{{define "planner_block"}}
<div class="planner-block" data-id="{{.ID}}" data-start="{{.StartMin}}" data-end="{{.EndMin}}"
     style="top: calc({{.StartMin}} * var(--ppm)); height: calc({{sub .EndMin .StartMin}} * var(--ppm));"
     title="{{.Title}}{{if .Description}} — {{.Description}}{{end}}">
  <div class="planner-block__inner">
    <span class="planner-block__time">{{.StartLabel}}–{{.EndLabel}}</span>
    <span class="planner-block__title">{{.Title}}</span>
    <button class="planner-block__del" type="button" title="{{t "action.delete"}}"
            hx-delete="/activities/{{.ID}}"
            hx-target="closest .planner-block"
            hx-swap="outerHTML"
            hx-confirm="{{t "activity.confirm_delete"}}">✕</button>
  </div>
  <span class="planner-block__resize" data-planner-resize></span>
</div>
{{end}}
