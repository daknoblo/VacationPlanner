{{define "overview_list"}}
{{if .}}
<ul id="overview-activities" class="activity-list">
  {{range .}}
  <li class="activity-item{{if not .HasCoords}} is-nogeo{{end}}" data-focus-map data-lat="{{coord .Latitude}}" data-lng="{{coord .Longitude}}">
    <div class="activity-item__when">
      <span class="activity-item__wd">{{.Weekday}}{{if .TimeLabel}} {{.TimeLabel}}{{end}}</span>
      <span class="activity-item__date">{{.DateLabel}}</span>
    </div>
    <div class="activity-item__body">
      {{if .Category}}<span class="activity-item__type {{catclass .Category}}">{{.Category}}</span>{{end}}
      <span class="activity-item__title">{{.Title}}</span>
    </div>
  </li>
  {{end}}
</ul>
{{else}}
<p class="muted">{{t "overview.empty"}}</p>
{{end}}
{{end}}
