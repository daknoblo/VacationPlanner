{{define "weekcal"}}
{{$cal := .CalTravel}}
<div class="weekcal" data-weekview hidden>
  <div class="weekcal__axis">
    <div class="weekcal__axishead"></div>
    {{range $h := seq 24}}<div class="weekcal__hour"><span>{{$h}}:00</span></div>{{end}}
  </div>
  <div class="weekcal__days">
    {{range $i, $d := .V.Days}}
    <div class="weekcal__day">
      <button type="button" class="weekcal__dayhead" data-goto-day="{{$i}}" title="{{t "tagesplan.view.day"}}">
        <span class="weekcal__dow">{{t (printf "weekday.%s" (weekday $d))}}</span>
        <span class="weekcal__date">{{fmtDate $d}}</span>
      </button>
      <div class="weekcal__col">
        {{range $.V.Items}}{{if and (.OnDay $d) .Timed}}
        <div class="weekcal-block"
             style="top: calc({{.StartMin}} * var(--ppm)); height: calc({{sub .EndMin .StartMin}} * var(--ppm));"
             title="{{.Title}} ({{.StartLabel}}–{{.EndLabel}})">
          <span class="weekcal-block__time">{{.StartLabel}}</span>
          <span class="weekcal-block__title">{{.Title}}</span>
        </div>
        {{end}}{{end}}
        {{range index $cal (dateInput $d)}}
        <div class="weekcal-block weekcal-block--travel"
             style="top: calc({{.StartMin}} * var(--ppm)); height: calc({{sub .EndMin .StartMin}} * var(--ppm));"
             title="{{.Title}} ({{.Label}})">
          <span class="weekcal-block__time">{{.Label}}</span>
          <span class="weekcal-block__title">✈ {{.Title}}</span>
        </div>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
