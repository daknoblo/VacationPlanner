{{define "content"}}
<section class="hero">
  <h1>{{t "index.hero.title"}}</h1>
  <p class="muted">{{t "index.hero.subtitle"}}</p>
</section>

<section class="panel">
  <details class="new-vacation" {{if not .Data.Vacations}}open{{end}}>
    <summary class="btn btn--primary">{{t "index.new"}}</summary>
    <form class="form grid"
          hx-post="/vacations"
          hx-target="#form-error"
          hx-swap="innerHTML"
          data-reset>
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <div class="field">
        <label for="title">{{t "field.title"}}</label>
        <input id="title" name="title" required maxlength="200" placeholder="{{t "placeholder.title"}}">
      </div>
      <div class="field field--wide location-picker">
        <label for="destination">{{t "field.destination"}}</label>
        <div class="location-picker__field">
          <input id="destination" name="destination" required maxlength="200"
                 autocomplete="off" data-geocode-input placeholder="{{t "placeholder.destination"}}">
          <div class="suggest" data-geocode-list hidden></div>
        </div>
        <input type="hidden" name="latitude" id="latitude" data-geocode-lat value="">
        <input type="hidden" name="longitude" id="longitude" data-geocode-lng value="">
        <div class="location-map" data-geocode-map data-lat="" data-lng=""></div>
        <p class="muted small">{{t "field.location.hint"}}</p>
      </div>
      <div class="field">
        <label for="start_date">{{t "field.from"}}</label>
        <input id="start_date" name="start_date" type="date" required data-date-from>
      </div>
      <div class="field">
        <label for="end_date">{{t "field.to"}}</label>
        <input id="end_date" name="end_date" type="date" required data-date-to>
      </div>
      <div class="field">
        <label for="budget">{{t "field.budget"}} <span class="muted">{{t "label.optional"}}</span></label>
        <input id="budget" name="budget" type="number" min="0" step="0.01" inputmode="decimal" placeholder="{{t "placeholder.budget"}}">
      </div>
      <div class="field">
        <label for="people">{{t "field.people"}}</label>
        <input id="people" name="people" type="number" min="1" step="1" value="1">
      </div>
      <div class="field field--wide">
        <label for="notes">{{t "field.notes"}}</label>
        <textarea id="notes" name="notes" rows="7" maxlength="5000" placeholder="{{t "placeholder.notes"}}"></textarea>
      </div>
      <div class="field field--wide">
        <div id="form-error" class="form-error"></div>
        <button class="btn btn--primary" type="submit">{{t "vacation.save"}}</button>
      </div>
    </form>
  </details>
</section>

{{if .Data.Vacations}}
<section class="cards">
  {{range .Data.Vacations}}{{template "vacation_card" .}}{{end}}
</section>
{{else}}
<section class="empty">
  <p>{{t "index.empty"}}</p>
</section>
{{end}}
{{end}}
