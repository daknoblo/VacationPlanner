{{define "base"}}<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · VacationPlanner</title>
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="/static/css/app.css?v={{.AssetVer}}">
</head>
<body class="page-{{.Page}}" data-week-start="{{.WeekStart}}">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">🌴 <span>VacationPlanner</span></a>
      <nav class="topbar__nav">
        <a href="/"{{if eq .Page "index"}} class="is-active"{{end}}>{{t "nav.dashboard"}}</a>
        {{if .CurrentID}}<a href="/vacations/{{.CurrentID}}"{{if eq .Page "vacation"}} class="is-active"{{end}}>{{t "nav.planning"}}</a>{{else}}<span class="is-disabled">{{t "nav.planning"}}</span>{{end}}
        {{if .CurrentID}}<a href="/vacations/{{.CurrentID}}/export"{{if eq .Page "export"}} class="is-active"{{end}}>{{t "nav.export"}}</a>{{else}}<span class="is-disabled">{{t "nav.export"}}</span>{{end}}
        <a href="/settings"{{if eq .Page "settings"}} class="is-active"{{end}}>{{t "nav.settings"}}</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{block "content" .}}{{end}}
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" data-saved="{{t "toast.saved"}}"></div>

  <dialog id="doc-preview" class="doc-preview" aria-label="{{t "doc.preview"}}">
    <div class="doc-preview__panel">
      <div class="doc-preview__bar">
        <span class="doc-preview__name" data-doc-preview-name></span>
        <span class="doc-preview__actions">
          <a class="doc-preview__download" data-doc-preview-download download
             title="{{t "doc.download"}}" aria-label="{{t "doc.download"}}">⬇</a>
          <button type="button" class="doc-preview__close" data-doc-preview-close
                  title="{{t "action.close"}}" aria-label="{{t "action.close"}}">✕</button>
        </span>
      </div>
      <div class="doc-preview__body" data-doc-preview-body></div>
    </div>
  </dialog>

  <script src="/static/vendor/htmx/htmx.min.js"></script>
  <script src="/static/vendor/leaflet/leaflet.js"></script>
  <script src="/static/js/app.js?v={{.AssetVer}}"></script>
</body>
</html>{{end}}
